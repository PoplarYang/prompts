<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pp local prompt template demo</title>
    <style>
      :root {
        color: #17202e;
        background: #f6f8fb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; }
      main { max-width: 1120px; margin: 0 auto; padding: 28px; }
      h1 { margin: 0 0 6px; font-size: 24px; }
      p { margin: 0 0 22px; color: #5d6b7d; }
      .grid { display: grid; grid-template-columns: 420px 1fr; gap: 18px; align-items: start; }
      section { border: 1px solid #d8e0ec; border-radius: 8px; background: #fff; }
      .form, .output { display: grid; gap: 12px; padding: 16px; }
      label { display: grid; gap: 6px; color: #526174; font-size: 13px; font-weight: 650; }
      input, textarea {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 7px;
        padding: 9px 10px;
        color: #17202e;
        background: #fff;
        font: inherit;
      }
      textarea { min-height: 180px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .actions { display: flex; gap: 8px; justify-content: flex-end; }
      button {
        border: 1px solid #cbd5e1;
        border-radius: 7px;
        padding: 8px 11px;
        color: #17202e;
        background: #f8fafc;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      button.primary { color: #fff; border-color: #15803d; background: #16a34a; }
      pre {
        min-height: 420px;
        overflow: auto;
        margin: 0;
        padding: 14px;
        border-radius: 7px;
        color: #263244;
        background: #f3f6fb;
        font-size: 13px;
        line-height: 1.55;
        white-space: pre-wrap;
      }
      .issues { display: grid; gap: 6px; margin: 0; padding: 0; list-style: none; }
      .issues li { border-radius: 6px; padding: 7px 9px; background: #eef2f7; color: #475569; font-size: 13px; }
      .issues li.ok { color: #166534; background: #dcfce7; }
      .issues li.warn { color: #92400e; background: #fef3c7; }
      .issues li.error { color: #991b1b; background: #fee2e2; }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <h1>pp 本地提示词模板 Demo</h1>
      <p>用于快速生成符合 pp 读取格式的 Markdown，并做轻量校验。这个 demo 不写入文件，只负责生成内容。</p>
      <div class="grid">
        <section class="form">
          <label>标题 <input id="title" value="Explain Error" /></label>
          <label>描述 <input id="description" value="解释报错原因并给出排查路径" /></label>
          <div class="row">
            <label>标签 <input id="tags" value="coding, debug" /></label>
            <label>分类 <input id="category" value="coding" /></label>
          </div>
          <div class="row">
            <label>别名 <input id="aliases" value="debug, error" /></label>
            <label>文件名 <input id="filename" value="explain-error.md" /></label>
          </div>
          <label>正文
            <textarea id="body">请帮我解释下面的报错。

请包含：

- 这个错误通常意味着什么
- 最可能的 3 个原因
- 如何一步步排查

报错信息：

{{error}}</textarea>
          </label>
          <div class="actions">
            <button id="validate" type="button">校验</button>
            <button id="generate" class="primary" type="button">生成 Markdown</button>
          </div>
          <ul id="issues" class="issues"></ul>
        </section>
        <section class="output">
          <pre id="output"></pre>
        </section>
      </div>
    </main>
    <script>
      const fields = ["title", "description", "tags", "category", "aliases", "filename", "body"];
      const $ = (id) => document.getElementById(id);
      function list(value) {
        return value.split(",").map((item) => item.trim()).filter(Boolean);
      }
      function markdown() {
        const tags = list($("tags").value);
        const aliases = list($("aliases").value);
        return `---\ntitle: ${$("title").value.trim()}\ndescription: ${$("description").value.trim()}\ntags: [${tags.join(", ")}]\ncategory: ${$("category").value.trim()}\naliases: [${aliases.join(", ")}]\n---\n\n${$("body").value.trim()}\n`;
      }
      function validate() {
        const issues = [];
        const filename = $("filename").value.trim();
        const body = $("body").value;
        if (!$("title").value.trim()) issues.push(["error", "title 必填"]);
        if (!$("description").value.trim()) issues.push(["warn", "建议填写 description，方便搜索"]);
        if (!list($("tags").value).length) issues.push(["warn", "建议至少填写一个 tag"]);
        if (!body.trim()) issues.push(["error", "正文不能为空"]);
        if (!/^[a-z0-9][a-z0-9-]*\.md$/.test(filename)) issues.push(["error", "文件名建议使用小写短横线，并以 .md 结尾"]);
        const variables = [...body.matchAll(/\{\{\s*([^}]+?)\s*\}\}/g)].map((match) => match[1]);
        const invalid = variables.filter((name) => !/^[a-zA-Z_][\w.-]*$/.test(name));
        if (invalid.length) issues.push(["error", `变量格式不合法：${invalid.join(", ")}`]);
        if (variables.length) issues.push(["ok", `检测到变量：${[...new Set(variables)].join(", ")}`]);
        if (!issues.length) issues.push(["ok", "校验通过"]);
        $("issues").innerHTML = issues.map(([kind, text]) => `<li class="${kind}">${text}</li>`).join("");
      }
      function render() {
        $("output").textContent = markdown();
        validate();
      }
      fields.forEach((id) => $(id).addEventListener("input", render));
      $("generate").addEventListener("click", render);
      $("validate").addEventListener("click", validate);
      render();
    </script>
  </body>
</html>
