name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

env:
  NODE_VERSION: "24"
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}

jobs:
  static:
    name: Static package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/verify_all.py
      - run: python3 scripts/package_release.py
      - uses: actions/upload-artifact@v4
        with:
          name: pp-static
          path: dist/pp-v1.0.0-static.zip

  macos:
    name: macOS desktop package (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-14
          - arch: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
        working-directory: desktop
      - run: npm run tauri build -- --bundles app
        working-directory: desktop
      - run: python3 scripts/package_desktop.py
      - run: python3 scripts/verify_desktop_package.py
      - name: Verify macOS DMG installation layout
        run: |
          set -euo pipefail
          mountpoint=$(mktemp -d)
          device=""
          cleanup() {
            if [ -n "$device" ]; then hdiutil detach "$device" -force || true; fi
            rmdir "$mountpoint" 2>/dev/null || true
          }
          trap cleanup EXIT
          device=$(hdiutil attach -nobrowse -readonly -nomount -plist dist/pp-desktop-macos-${{ matrix.arch }}.dmg | /usr/libexec/PlistBuddy -c 'Print :system-entities:0:dev-entry' /dev/stdin)
          hdiutil attach -nobrowse -readonly -mountpoint "$mountpoint" dist/pp-desktop-macos-${{ matrix.arch }}.dmg >/dev/null
          test -d "$mountpoint/pp.app"
          test -L "$mountpoint/Applications"
          test -f "$mountpoint/README-MACOS.txt"
          grep -q "xattr -cr /Applications/pp.app" "$mountpoint/README-MACOS.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: pp-desktop-macos-${{ matrix.arch }}
          path: |
            dist/pp-desktop-macos-${{ matrix.arch }}.zip
            dist/pp-desktop-macos-${{ matrix.arch }}.dmg

  windows:
    name: Windows desktop package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
        working-directory: desktop
      - run: npm run tauri build -- --bundles nsis
        working-directory: desktop
      - name: Verify Windows installer
        shell: bash
        run: python3 scripts/verify_windows_package.py desktop/src-tauri/target/release/bundle/nsis/*.exe
      - uses: actions/upload-artifact@v4
        with:
          name: pp-desktop-windows
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

  publish:
    name: Publish GitHub release
    needs: [static, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Prepare release notes
        run: |
          mkdir -p release-metadata
          notes_file="docs/release-notes/${RELEASE_TAG}.md"
          if [ -f "$notes_file" ]; then
            cp "$notes_file" release-metadata/release-notes.md
          else
            {
              echo "# pp ${RELEASE_TAG}"
              echo
              echo "Release notes are pending."
            } > release-metadata/release-notes.md
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: pp ${{ env.RELEASE_TAG }}
          body_path: release-metadata/release-notes.md
          draft: true
          prerelease: false
          files: release-assets/*
