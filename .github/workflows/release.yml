name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

env:
  NODE_VERSION: "24"
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}

jobs:
  static:
    name: Static package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/verify_all.py
      - run: python3 scripts/package_release.py
      - uses: actions/upload-artifact@v4
        with:
          name: pp-static
          path: dist/pp-v1.0.0-static.zip

  macos:
    name: macOS desktop package
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
        working-directory: desktop
      - run: npm run tauri build -- --bundles app
        working-directory: desktop
      - run: python3 scripts/package_desktop.py
      - run: python3 scripts/verify_desktop_package.py
      - uses: actions/upload-artifact@v4
        with:
          name: pp-desktop-macos
          path: |
            dist/pp-desktop-macos-*.zip
            dist/pp-desktop-macos-*.dmg

  windows:
    name: Windows desktop package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
        working-directory: desktop
      - run: npm run tauri build -- --bundles nsis
        working-directory: desktop
      - uses: actions/upload-artifact@v4
        with:
          name: pp-desktop-windows
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

  publish:
    name: Publish GitHub release
    needs: [static, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: pp ${{ env.RELEASE_TAG }}
          draft: true
          prerelease: false
          files: release-assets/*
